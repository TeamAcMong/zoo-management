# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: max_level
    status: active
    source: design/gdd/animal-database.md
    referenced_by:
      - design/gdd/animal-database.md   # defines it (ANIMALS last unlock = Lv92)
      - design/gdd/zoo-economy.md       # guard in prototype: level >= MAX_LEVEL
      # add C3 Zoo Level Progression GDD when written
      - design/gdd/zoo-level.md         # C3 — owns the LEVEL_XP curve that terminates at Lv92
    value: 92
    unit: zoo_level
    notes: "Aligns with the final animal unlock (Dolphin at Lv92). Changing this
      requires re-generating the LEVEL_XP curve and all content gates."
    added: 2026-06-06
    revised: ""

  - name: appeal_ladder
    status: active
    source: design/gdd/animal-database.md
    referenced_by:
      - design/gdd/animal-database.md   # defines the 29 baseAppeal values in ANIMALS
      - design/gdd/zoo-economy.md       # §4 documents the ladder; economy uses these values
      - design/gdd/animal-care.md       # C1 — care cost scales off tier/appeal
      - design/gdd/animal-collection.md # Fe1 — buy_more_cost scales off appeal
      - design/gdd/habitat-system.md    # Fe2 — enclosure_upgrade_cost scales off appeal
      - design/gdd/enrichment.md        # Fe3 — enrichment_cost scales off appeal
    value: "3,8,14,30,50,70,85,130,150,170,190,230,260,290,330,400,470,540,610,700,850,1000,1150,1350,1550,1800,2100,2500,3000"
    unit: appeal_points_per_animal_at_baseline
    notes: "29 values — one per species in unlock-level order. Strictly non-decreasing.
      Sum of all values = 17,468. Max = 3,000 (Dolphin). Owned by F1; do NOT edit in
      zoo-economy.md independently — change data.jsx and update the GDD ladder table."
    added: 2026-06-06
    revised: ""

  - name: gold_start
    status: active
    source: design/gdd/currency-system.md
    referenced_by:
      - design/gdd/currency-system.md   # defines starting balance (Table: Starting balances)
      - design/gdd/save-load.md         # F3 — new-game init seeds this value; save restores it
      # add M2 Monetisation Shell GDD when written (onboarding context)
    value: 50
    unit: gold
    notes: "Starting Gold balance for a brand-new player session. Changing this
      affects how quickly new players can make their first meaningful purchase.
      Safe range: 20–500 gold."
    added: 2026-06-06
    revised: ""

  - name: gems_start
    status: active
    source: design/gdd/currency-system.md
    referenced_by:
