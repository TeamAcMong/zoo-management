# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-06-06"   # incl. implementation pass: save/load, offline, decay, caps, gates, cost mults

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: level_xp_curve
    status: active
    source: design/gdd/zoo-level.md
    referenced_by:
      - design/gdd/zoo-level.md          # owns the curve (generated in data.jsx)
      - design/gdd/currency-system.md    # F2 OQ-5 was blocked on this; XP is the input
      - design/gdd/animal-database.md     # F1 — final unlock (Dolphin Lv92) must align
      - design/gdd/animal-care.md         # C1 — care grants XP into this curve
      - design/gdd/quests-missions.md     # Fe6 — quest XP rewards feed this curve
      # add idle-offline.md when offline XP is defined (currently excluded)
    variables:
      - anchors            # 7 hand-authored {lv, xp} pairs in data.jsx LEVELS table
      - segment_interp     # geometric interpolation between anchors; power-law (exp 2.2) for first segment from 0
      - extension_ratio    # perLv ≈ 1.0698 = 5^(1/24) for Lv85–92 endgame band
    output_range: [0, 31000000]   # LEVEL_XP[0]=0 → LEVEL_XP[91] ≈ 30.6M–31M
    expression: >
      Piecewise geometric. Segment k between anchors a,b: x = a.xp*(b.xp/a.xp)^f,
      f=(lv-a.lv)/(b.lv-a.lv). First segment (a.xp=0): x = b.xp*f^2.2.
      Lv85-92: arr[lv-1] = roundNice(arr[lv-2]*1.0698).
    notes: "FOUND IN CODE — generated at module load by an IIFE in act/data.jsx from
      7 anchor points. Key values: Lv1=0, Lv7=5200, Lv18=42000, Lv30=210000,
      Lv45=980000, Lv60=3600000, Lv84=18000000, Lv92≈30.6M–31M (runtime-computed).
      Tune pacing by editing the LEVELS anchors ONLY — never edit LEVEL_XP directly.
      Canonical Lv85-92 values: run console.log(LEVEL_XP) on the live page."
    added: 2026-06-06
    revised: ""

  - name: happy_mult
    status: active
    source: design/gdd/zoo-economy.md       # C2 documented the multiplier first; it owns the appeal-side semantics
    referenced_by:
      - design/gdd/zoo-economy.md            # C2 consumes happyMult as an appeal multiplier
      - design/gdd/animal-care.md            # C1 computes it from meters[k].happy
      - design/gdd/enrichment.md             # Fe3 — enrichment's +18 happy feeds happyMult
    variables:
      - welfare        # per-animal mean of (hunger,thirst,clean,happy), 0–100
      - avgWelfare     # mean of welfare across owned animals (defaults to 60 when none owned)
      - happyMult      # output multiplier
    output_range: [0.5, 1.4]
    expression: "welfare(k) = (hunger+thirst+clean+happy)/4 ; happyMult = clamp(0.4 + avgWelfare/100, 0.5, 1.4)"
    notes: "REVISED 2026-06-06 — was clamp(0.4 + avgHappiness/100,…) using meters[k].happy ALONE.
      Now a WELFARE COMPOSITE of all four needs, so feeding/watering/cleaning each move the economy
      (resolves C1 OQ-2 / removes the dominant 'spam free Play' strategy). Source: prototype.jsx welfareOf."
    added: 2026-06-06
    revised: "2026-06-06"

  - name: unlock_gold_cost
    status: active
    source: design/gdd/animal-collection.md
    referenced_by:
      - design/gdd/animal-collection.md   # Fe1 owns the adopt-unlock gate
      - design/gdd/currency-system.md      # F2 §D documents it as Fe1-owned
      - design/gdd/zoo-economy.md          # Gold sink table
    variables:
      - lv          # ANIMALS[k].unlock level, 1–92
      - base        # unlock_curve_base = 500
      - growth      # unlock_curve_growth = 1.06
    output_range: [500, 35000]   # ~500 at Lv1 → ~28k–35k at Lv92
    expression: "unlockGold = roundNice(500 × 1.06^(lv−1))"
    notes: "Gold cost to unlock a new species, gated by Zoo Level. Generated by an IIFE
      in data.jsx (UNLOCKS). roundNice snaps to pretty numbers. Source: prototype.jsx unlockAnimal."
    added: 2026-06-06
    revised: ""

  - name: buy_more_cost
    status: active
    source: design/gdd/animal-collection.md
    referenced_by:
      - design/gdd/animal-collection.md   # Fe1 owns buy-more
      - design/gdd/currency-system.md      # F2 §D BUY_COST_MULT knob
      - design/gdd/zoo-economy.md          # Gold sink table
    variables:
      - appeal      # ANIMALS[k].appeal, 3–3000
      - count       # current owned count before purchase
      - mult        # BUY_COST_MULT = 50
    output_range: [100, 150050]   # Dolphin 2nd copy ≈ 150,050
    expression: "buyCost = round(appeal × 50 × count) + 50"
    notes: "REVISED 2026-06-06 (balance-check pass) — mult raised 11→50 to close the
      8.5× ROI gap vs enclosure upgrades. Target payback ~10 min; upgrade target ~15 min → 1.5× gap.
      Previous values: was 22, then provisionally halved to 11.
      Source: prototype.jsx buyMoreAnimal + proto-screens.jsx."
    added: 2026-06-06
    revised: "2026-06-06"

  - name: daily_gem_faucet
    status: active
    source: design/gdd/quests-missions.md
    referenced_by:
      - design/gdd/quests-missions.md     # Fe6 owns missions
      - design/gdd/currency-system.md      # F2 OQ-3 / Gem daily trickle
    variables:
      - missionCount   # 1–5 per day
      - missionGems    # 5–15 per mission
    output_range: [5, 75]   # gems/day
    expression: "dailyGems = missionCount × missionGems"
    notes: "RECONCILED: data.jsx SOURCES '5–15/day' is the PER-MISSION range, not the
      daily total. Daily ceiling = 5 missions × 15 = 75 gems/day. Matches F2's formula.
      ⚠️ Daily missions are NOT yet implemented (Fe6 OQ-3) — free Gem faucet is currently 0."
    added: 2026-06-06
    revised: ""

  - name: offline_gold_formula
    status: active
    source: design/gdd/idle-offline.md
    referenced_by:
      - design/gdd/idle-offline.md        # Fe7 owns offline accrual
      - design/gdd/save-load.md           # F3 must save closedAt for this to work
      - design/gdd/zoo-economy.md         # reuses goldPerSec
    variables:
      - elapsed     # now − closedAt, seconds (clamped ≥ 0)
      - cap         # offline_cap_free_sec or offline_cap_vip_sec
      - goldPerSec  # C2 rate, reconstructed from saved state
      - factor      # offline_rate_factor = 0.60
    output_range: [0, 86400_times_rate]
    expression: "offlineGold = floor( min(elapsed, cap) × goldPerSec × 0.60 )"
    notes: "IMPLEMENTED 2026-06-06 — real on-resume accrual using saved rate + closedAt (elapsed =
      now − closedAt, clamped to 8h). Modal now shows real numbers. GOLD ONLY (no offline XP — resolves
      the zoo-level↔idle-offline '+820 XP' contradiction). VIP 24h cap not yet wired (no VIP flag)."
    added: 2026-06-06
    revised: "2026-06-06"

  - name: enclosure_upgrade_cost
    status: active
    source: design/gdd/habitat-system.md
    referenced_by:
      - design/gdd/habitat-system.md      # Fe2 owns enclosure upgrades (primary Gold sink)
      - design/gdd/currency-system.md      # F2 §D UPGRADE_COST_MULT knob
      - design/gdd/animal-database.md      # F1 §D references it
      - design/gdd/zoo-economy.md          # Gold sink table
    variables:
      - appeal      # ANIMALS[k].appeal
      - encLv       # current enclosure level 1–5
      - mult        # upgrade_cost_mult = 80
      - floor       # upgrade_cost_floor = 300
    output_range: [300, 1200300]
    expression: "upgradeCost = round(appeal × 80 × encLv) + 300"
    notes: "REVISED 2026-06-06 — mult halved 160→80. Enclosure now hard-capped at Lv5 (enforced).
      ⚠️ Provisional — confirm in /balance-check. Source: prototype.jsx upgradeEnc + proto-screens.jsx."
    added: 2026-06-06
    revised: "2026-06-06"

  - name: enclosure_appeal_mult
    status: active
    source: design/gdd/habitat-system.md
    referenced_by:
      - design/gdd/habitat-system.md       # Fe2 owns the +25%/level payoff
      - design/gdd/zoo-economy.md           # C2 appealOf uses it
      - design/gdd/currency-system.md       # F2 §D
      - design/gdd/enrichment.md            # Fe3 — enrichment factor stacks with this in appealOf
    variables:
      - encLv       # enclosure level 1–5
      - bonus       # enc_appeal_bonus_per_level = 0.25
    output_range: [1.0, 2.0]
    expression: "encMult = 1 + 0.25 × (encLv − 1)"
    notes: "Each enclosure level adds +25% appeal; ×2.0 at Lv5 (the upgrade payoff).
      ⚠️ CONFLICT (Fe2 OQ-4): the HAB_UPGRADE display table in data.jsx shows ×3.0 at Lv5
      — stale/wrong. The runtime multOf / this 0.25 formula is CANONICAL. Source: prototype.jsx multOf."
    added: 2026-06-06
    revised: ""

  - name: enclosure_capacity
    status: active
    source: design/gdd/habitat-system.md
    referenced_by:
      - design/gdd/habitat-system.md       # Fe2 owns enclosure slot capacity
      - design/gdd/animal-collection.md     # Fe1 capOf gates buy-more
    variables:
      - encLv       # enclosure level 1–5
      - base        # enc_capacity_base = 2
    output_range: [2, 6]
    expression: "capOf = 2 + (encLv − 1)"
    notes: "Max copies of a species per enclosure; gates buy-more in Fe1. ⚠️ Some ENC_COUNTS
      display values (e.g. 3) exceed capOf(Lv1)=2 — cosmetic only (ENC_COUNTS is locked-card
      preview metadata, NOT runtime pops; resolves Fe1 OQ-5). Source: proto-screens.jsx capOf."
    added: 2026-06-06
    revised: ""

  - name: attraction_revenue_multiplier
    status: active
    source: design/gdd/attractions.md
    referenced_by:
      - design/gdd/attractions.md          # Fe4 owns the |built| revenue factor
      - design/gdd/zoo-economy.md           # C2 goldPerSec uses it
    variables:
      - visitors    # from C2
      - spend       # SPEND_PER_VISITOR = 0.05
      - revMult     # attraction_revenue_mult = 0.12 per built attraction
      - builtCount  # |built|, 0–5
    output_range: [1, "unbounded (floored at 1)"]
    expression: "goldPerSec = max(1, round(visitors × 0.05 × (1 + 0.12 × |built|)))"
    notes: "⚠️ Fe4 HIGH: per-attraction effect LABELS in data.jsx (+12% visitors / +15% revenue
      / +18% reputation / +20% / +25%) are cosmetic lies — ALL attractions contribute IDENTICALLY
      via the |built| counter. C2's unified formula is canonical. Source: prototype.jsx ~line 101."
    added: 2026-06-06
    revised: ""

  - name: enrichment_cost
    status: active
    source: design/gdd/enrichment.md
    referenced_by:
      - design/gdd/enrichment.md           # Fe3 owns enrichment
      - design/gdd/currency-system.md       # F2 §D ENRICH_COST_MULT knob
      - design/gdd/zoo-economy.md           # Gold sink table
    variables:
      - appeal      # ANIMALS[k].appeal
      - enrLv       # current enrichment level (0,1,2,…)
      - mult        # ENRICH_COST_MULT = 20
      - floor       # ENRICH_COST_FLOOR = 200
    output_range: [260, 60200]   # Rabbit first ≈ 260; Dolphin Lv0→1 = 60,200
    expression: "enrichCost = round(appeal × 20 × (enrLv + 1)) + 200"
    notes: "REVISED 2026-06-06 — mult halved 40→20. Enrichment now hard-capped at Lv5 (enforced),
      so appeal is bounded. ⚠️ Provisional — confirm in /balance-check. Source: prototype.jsx + proto-screens.jsx."
    added: 2026-06-06
    revised: "2026-06-06"

  - name: enrichment_appeal_factor
    status: active
    source: design/gdd/enrichment.md
    referenced_by:
      - design/gdd/enrichment.md            # Fe3 owns the +10%/level payoff
      - design/gdd/zoo-economy.md            # C2 appealOf uses it
      - design/gdd/currency-system.md        # F2 §D
      - design/gdd/habitat-system.md         # Fe2 ROI cross-refs it
    variables:
      - enrLv       # enrichment level (0,1,2,…)
      - bonus       # ENRICH_APPEAL_BONUS_PER_LEVEL = 0.10
    output_range: [1.0, "unbounded — no cap in code"]
    expression: "enrichFactor = 1 + 0.10 × enrLv"
    notes: "Stacks MULTIPLICATIVELY with enclosure_appeal_mult in C2 appealOf. ⚠️ Fe3 OQ-1:
      addEnrichment has NO level cap — appeal can grow unbounded. Recommend MAX_ENRICH_LEVEL=5."
    added: 2026-06-06
    revised: ""

