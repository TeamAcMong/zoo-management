# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: max_level
    status: active
    source: design/gdd/animal-database.md
    referenced_by:
      - design/gdd/animal-database.md   # defines it (ANIMALS last unlock = Lv92)
      - design/gdd/zoo-economy.md       # guard in prototype: level >= MAX_LEVEL
      # add C3 Zoo Level Progression GDD when written
      - design/gdd/zoo-level.md         # C3 — owns the LEVEL_XP curve that terminates at Lv92
    value: 92
    unit: zoo_level
    notes: "Aligns with the final animal unlock (Dolphin at Lv92). Changing this
      requires re-generating the LEVEL_XP curve and all content gates."
    added: 2026-06-06
    revised: ""

