<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animal World Zoo — Build Spec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="act/colors_and_type.css" />
  <link rel="stylesheet" href="act/kit.css" />
  <link rel="stylesheet" href="act/act.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#1F8A5B"/>
      <g transform="translate(50 50)">
        <path d="M-30 6 A30 22 0 0 1 30 6" fill="none" stroke="#8A5A3C" stroke-width="6"/>
        <rect x="-30" y="6" width="6" height="20" fill="#8A5A3C"/>
        <rect x="24" y="6" width="6" height="20" fill="#8A5A3C"/>
        <text x="0" y="2" font-family="sans-serif" font-size="20" text-anchor="middle">🦁</text>
      </g>
      <text x="50" y="88" font-family="sans-serif" font-size="8.5" font-weight="800" fill="#FFE3B3" text-anchor="middle">ZOO</text>
    </svg>
  </template>

  <script type="text/babel" src="act/icons.jsx"></script>
  <script type="text/babel" src="act/data.jsx"></script>
  <script type="text/babel" src="act/kit.jsx"></script>
  <script type="text/babel" src="act/live-scene.jsx"></script>
  <script type="text/babel" src="act/show-stage.jsx"></script>
  <script type="text/babel" src="act/activity-stage.jsx"></script>
  <script type="text/babel" src="act/proto-screens.jsx"></script>
  <script type="text/babel" src="act/quest-admin.jsx"></script>
  <script type="text/babel" src="act/tutorial.jsx"></script>
  <script type="text/babel" src="act/prototype.jsx"></script>
  <script type="text/babel" src="act/views-doc.jsx"></script>
  <script type="text/babel" src="act/views-world.jsx"></script>
  <script type="text/babel" src="act/views-train.jsx"></script>
  <script type="text/babel" src="act/views-quests.jsx"></script>
  <script type="text/babel" src="act/views-ux.jsx"></script>
  <script type="text/babel" src="act/views-systems.jsx"></script>
  <script type="text/babel" src="act/views-ops.jsx"></script>
  <script type="text/babel" src="act/views-extra.jsx"></script>

  <script type="text/babel">
    const CRUMBS = {
      overview:['Design doc','Overview'], loop:['Design doc','Core loop'], animals:['Design doc','Animals'],
      world:['Design doc','Habitats & attractions'], care:['Design doc','Care & performance'],
      activities:['Design doc','Entertainment activities'],
      quests:['Onboarding','New player quests'],
      proto:['Prototype','Live prototype'], ux:['Prototype','UX & wireframes'],
      economy:['Systems','Economy'], progression:['Systems','Zoo progression'], retention:['Systems','Retention'],
      monetization:['Systems','Monetization'], endgame:['Systems','Endgame'],
      liveops:['Operations','LiveOps'], plan:['Operations','90-day journey'], roadmap:['Operations','Content roadmap'],
      tech:['Build','Tech architecture'], data:['Build','Data tables'], mvp:['Build','MVP scope'],
    };

    function ProtoView() {
      return (
        <div className="kat-page page-wide">
          <PageHead eyebrow="Prototype" title="Live prototype" sub="A self-running idle zoo — watch visitors arrive and gold tick in, then tap in to care for animals and run a show." action={<span className="spec-tag"><Sparkles size={14} />Playful surface · art stand-ins</span>} />
          <Phone />
        </div>
      );
    }

    function App() {
      const [active, setActive] = React.useState('overview');
      const mainRef = React.useRef(null);
      const go = (id) => { setActive(id); if (mainRef.current) mainRef.current.scrollTop = 0; };

      const VIEWS = {
        overview: <Overview onNavigate={go} />, loop: <CoreLoop />, animals: <Animals />,
        world: <World />, care: <CarePerformance />, activities: <ActivitiesDoc />, quests: <Quests />,
        proto: <ProtoView />, ux: <UXFlow />,
        economy: <Economy />, progression: <Progression />, retention: <Retention />,
        monetization: <Monetization />, endgame: <Endgame />,
        liveops: <LiveOps />, plan: <ProgressionPlan />, roadmap: <Roadmap />,
        tech: <TechArch />, data: <DataTables />, mvp: <MVPScope />,
      };

      return (
        <div className="kat-app">
          <Sidebar active={active} onNavigate={go} />
          <Topbar crumbs={CRUMBS[active] || ['Workspace']} />
          <main className="kat-main" ref={mainRef}>{VIEWS[active]}</main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
