name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unity Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Edit Mode tests (AWZ.Domain — pure C#, no engine dependency) ──────
      - name: Run Edit Mode Tests
        uses: game-ci/unity-test-runner@v4
        id: editmode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.17f1
          testMode: editmode
          artifactsPath: test-results/editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Edit Mode Test Results

      # ── Play Mode tests (AWZ.Runtime — integration, scene required) ────────
      - name: Run Play Mode Tests
        uses: game-ci/unity-test-runner@v4
        id: playmode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.17f1
          testMode: playmode
          artifactsPath: test-results/playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Play Mode Test Results

      # ── Upload test results for review ────────────────────────────────────
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

# ── FIRST-TIME SETUP NOTE ──────────────────────────────────────────────────
# Before this workflow can run, add these secrets to the GitHub repository:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   UNITY_LICENSE  — the contents of your Unity .ulf license file
#   UNITY_EMAIL    — the email address on your Unity account
#   UNITY_PASSWORD — the password on your Unity account
#
# See https://game.ci/docs/github/getting-started for full documentation.
# The AWZ.Domain assembly has no UnityEngine dependency (ADR-0002), so
# Edit Mode tests run in a headless environment with no graphics needed.
